<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JustBall</title>
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <div id="app">
    <div id="toolbar">
      <button class="tool-btn active" data-tool="ball" title="Ball Tool">&#9898; Ball</button>
      <button class="tool-btn" data-tool="wall" title="Wall Tool">&#9999; Wall</button>
      <button class="tool-btn" data-tool="eraser" title="Eraser Tool">&#128465; Eraser</button>
      <button class="tool-btn" data-tool="boost" title="Boost Tool — click a ball to launch it">&#9889; Boost</button>
      <button class="tool-btn" data-tool="launcher" title="Launcher Tool — drag to place, click to fire">&#128640; Launcher</button>
      <button class="tool-btn" data-tool="star" title="Star Tool — place a star to collect for score">&#11088; Star</button>
      <button class="tool-btn" data-tool="target" title="Target Tool — place a target; hit all targets to clear the stage">&#127919; Target</button>
      <div class="separator"></div>
      <span class="hint">Space=일시정지 | X=인벤토리 | Q=파워모드</span>
      <div class="separator"></div>
      <button id="test-mode-btn" title="현재 맵 테스트">&#9654; 테스트</button>
      <button id="clear-btn" title="Clear All">&#128465; Clear</button>
    </div>
    <div id="lobby-overlay">
      <div id="lobby-content">
        <h1 class="lobby-title">JustBall</h1>
        <p class="lobby-subtitle">2D 샌드박스 물리 퍼즐 게임</p>
        <div class="lobby-buttons">
          <button id="btn-play-mode" class="lobby-btn">&#127918; 플레이 모드</button>
          <button id="btn-sandbox-mode" class="lobby-btn">&#129514; 샌드박스 모드</button>
        </div>
      </div>
    </div>
    <canvas id="game-canvas"></canvas>
    <div id="status">Bodies: 0</div>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
