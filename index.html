<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JustBall</title>
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <div id="app">
    <div id="toolbar">
      <button class="tool-btn active" data-tool="ball" title="Ball Tool">&#9898; Ball</button>
      <button class="tool-btn" data-tool="pencil" title="Pencil Tool">&#9999; Pencil</button>
      <button class="tool-btn" data-tool="eraser" title="Eraser Tool">&#128465; Eraser</button>
      <div class="separator"></div>
      <button class="color-btn active" data-color="#333333" title="Ground (Black)" style="background:#333333;"></button>
      <button class="color-btn" data-color="#f5c542" title="Bounce (Yellow)" style="background:#f5c542;"></button>
      <button class="color-btn" data-color="#e74c3c" title="Kill (Red)" style="background:#e74c3c;"></button>
      <div class="separator"></div>
      <button id="clear-btn" title="Clear All">&#128465; Clear</button>
    </div>
    <canvas id="game-canvas"></canvas>
    <div id="status">Bodies: 0</div>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
