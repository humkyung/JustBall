<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JustBall</title>
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <div id="app">
    <div id="toolbar">
      <button class="tool-btn active" data-tool="ball" title="Ball Tool">&#9898; Ball</button>
      <button class="tool-btn" data-tool="wall" title="Wall Tool">&#9999; Wall</button>
      <button class="tool-btn" data-tool="eraser" title="Eraser Tool">&#128465; Eraser</button>
      <button class="tool-btn" data-tool="boost" title="Boost Tool — click a ball to launch it">&#9889; Boost</button>
      <button class="tool-btn" data-tool="star" title="Star Tool — place a star to collect for score">&#11088; Star</button>
      <div class="separator"></div>
      <span class="hint">Space=일시정지 | X=인벤토리 | Q=파워모드</span>
      <div class="separator"></div>
      <button id="clear-btn" title="Clear All">&#128465; Clear</button>
    </div>
    <canvas id="game-canvas"></canvas>
    <div id="status">Bodies: 0</div>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
